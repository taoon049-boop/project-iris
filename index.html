<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EYES ONLY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

</head>

<body>

<div id="app">

<section id="boot" class="screen active">

<div class="boot-container">

<h1>EYES ONLY</h1>

<p id="bootText"></p>

<div class="loading-bar">

<div class="loading-fill"></div>

</div>

</div>

</section>
<section id="profile" class="screen">

<div class="center-box">

<h1>PROFILE FOUND</h1>

<h2>MARLA</h2>

<p>

Some people leave memories.

<br><br>

You left a universe.

</p>

<button id="enterBtn">

ENTER

</button>

</div>

</section>

<section id="eyes" class="screen">

<div class="eyes-container">

<img
id="eyeImage"
src="IMG_20260604_173302_159.jpg"
alt="Eyes">

<div class="eye-glow"></div>

</div>

<button id="scanBtn">

SCAN

</button>

</section>
<section id="scan" class="screen">

<div class="scan-box">

<h2>IDENTITY CONFIRMED</h2>

<p>Name : Marla</p>

<p>Status : Classified</p>

<p>Memory : Unlocked</p>

<p>Safe Place : Your Eyes</p>

<button id="voiceBtn">

PLAY MESSAGE

</button>

</div>

</section>

<section id="voice" class="screen">

<div class="voice-box">

<h2>Playing Message...</h2>

<audio id="voice" controls>

<source src="c9af29df.mp3" type="audio/mpeg">

</audio>

</div>

</section>

<section id="ending" class="screen">

<div class="ending-box">

<h2 id="endingText"></h2>

<p>

Created by

<br>

TAOON

</p>

</div>

</section>
</div>

</body>

</html>
